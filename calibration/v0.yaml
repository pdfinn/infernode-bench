    Write an Inferno sh sequence that chains three Veltro tools: `find` to list `.b` files under `/appl/cmd`, then for each result, `grep` to find `"implement"` in that file, then `read` to print the matching line. Use the canonical write→read pattern against each tool's `/tool/<name>/ctl`.
