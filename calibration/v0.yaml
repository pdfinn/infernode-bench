- id: calib_sh_retry_v1
  category: inferno_sh
  difficulty: medium
  language: inferno_sh
  prompt: |
    Write an Inferno sh function `retry` that takes a command in its arguments, runs it, and if it fails, prints `retry 1` and runs it once more. If both fail, print `gave up`. Then call `retry echo hello`.
  grader:
    kind: compile_gate
    config:
      gate_lang: rc
  golden:
    source: "fn retry {\n\t$* || { echo retry 1 ; $* || echo gave up }\n}\n\
      retry echo hello\n"
  needs_golden: false
  provenance:
    authored_by: human
    spdx: MIT
  tags:
  - calibration_v0
  - golden_validated_via_iol_gate
  notes: Tests fn-definitions + `||` + `$*` argument forwarding.
- id: calib_sh_namespace_run_v1
  category: inferno_sh
  difficulty: hard
  language: inferno_sh
  prompt: |
    Write an Inferno sh snippet that does the following in order: bind `/n/local` after `/usr/me/tmp`; run the command `ls /usr/me/tmp`; unmount `/n/local`. Use the `-a` flag on bind for after-mount.
  grader:
