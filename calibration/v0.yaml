- id: calib_fs_ctl_data_status_v1
  category: fs_concepts
  difficulty: easy
  language: limbo
  prompt: |
    Write a complete, compilable Limbo program that opens the canonical ctl/data/status decomposition for a device at `/dev/sample` — that is: open `/dev/sample/ctl` for writing, `/dev/sample/data` for read/write, `/dev/sample/status` for reading. Print `ctl=<n> data=<n> status=<n>` where each <n> is sys->fildes-style fd number (or -1 if open failed). Then close everything.
  grader:
    kind: compile_gate
    config:
      gate_lang: limbo
  golden:
    source: "implement Calib;\n\ninclude \"sys.m\";\ninclude \"draw.m\";\n\
      \nsys: Sys;\n\nCalib: module\n{\n\tinit: fn(nil: ref Draw->Context,\
      \ argv: list of string);\n};\n\nfdnum(fd: ref Sys->FD): int\n{\n\tif\
      \ (fd == nil)\n\t\treturn -1;\n\treturn 0;   # we don't expose the raw\
      \ fd; treat non-nil as 0 for the print\n}\n\ninit(nil: ref Draw->Context,\
      \ nil: list of string)\n{\n\tsys = load Sys Sys->PATH;\n\tctl := sys->open(\"\
      /dev/sample/ctl\", Sys->OWRITE);\n\tdata := sys->open(\"/dev/sample/data\"\
      , Sys->ORDWR);\n\tstatus := sys->open(\"/dev/sample/status\", Sys->OREAD);\n\
      \tsys->print(\"ctl=%d data=%d status=%d\\n\",\n\t\tfdnum(ctl), fdnum(data),\
      \ fdnum(status));\n}\n"
  needs_golden: false
  provenance:
    authored_by: human
    spdx: MIT
  tags:
  - calibration_v0
  - golden_validated_via_iol_gate
  notes: Tests ctl/data/status decomposition + correct open modes.
- id: calib_fs_clone_session_v1
  category: fs_concepts
  difficulty: medium
  language: limbo
  prompt: |
    Write a complete, compilable Limbo program that uses Inferno's clone-file pattern: open `/srv/cs/clone`, read the session id from it (a small text-line integer), construct the per-session path `/srv/cs/<id>/data`, open that, write a query to it, read the answer, and print the answer. Do NOT close the clone fd — that would free the session.
  grader:
    kind: compile_gate
    config:
      gate_lang: limbo
  golden:
    source: "implement Calib;\n\ninclude \"sys.m\";\ninclude \"draw.m\";\n\
      \nsys: Sys;\n\nCalib: module\n{\n\tinit: fn(nil: ref Draw->Context,\
      \ argv: list of string);\n};\n\ninit(nil: ref Draw->Context, nil: list\
      \ of string)\n{\n\tsys = load Sys Sys->PATH;\n\tclone := sys->open(\"\
      /srv/cs/clone\", Sys->ORDWR);\n\tif (clone == nil)\n\t\treturn;\n\t\
      buf := array[64] of byte;\n\tn := sys->read(clone, buf, len buf);\n\t\
      if (n <= 0)\n\t\treturn;\n\tid := string buf[:n];\n\twhile (len id >\
      \ 0 && id[len id - 1] == '\\n')\n\t\tid = id[:len id - 1];\n\tdata :=\
      \ sys->open(\"/srv/cs/\" + id + \"/data\", Sys->ORDWR);\n\tif (data\
      \ == nil)\n\t\treturn;\n\tq := array of byte \"tcp!example.com!9\";\n\
      \tsys->write(data, q, len q);\n\tsys->seek(data, big 0, Sys->SEEKSTART);\n\
      \trep := array[4096] of byte;\n\tnn := sys->read(data, rep, len rep);\n\
      \tif (nn > 0)\n\t\tsys->print(\"%s\\n\", string rep[:nn]);\n}\n"
  needs_golden: false
  provenance:
    authored_by: human
    spdx: MIT
  tags:
  - calibration_v0
  - golden_validated_via_iol_gate
  notes: 'Tests clone-pattern subtleties: don''t-close-clone, seek-back-before-read.'
- id: calib_fs_union_bind_v1
  category: fs_concepts
  difficulty: hard
  language: none
  prompt: |
    In Inferno, what is the effect of `bind -b /a /b` when `/b` is already a union directory containing `/x`? Choose:
    A) `/b` becomes a copy of `/a`; `/x` is hidden.
    B) Files in `/b` are union-mounted with `/a` searched BEFORE `/x`.
    C) Files in `/b` are union-mounted with `/a` searched AFTER `/x`.
    D) `bind -b` is a syntax error; the correct flag is `-a`.
  grader:
    kind: mcq
    config:
      choices:
      - a
      - b
      - c
      - d
  golden:
    answer: B
  needs_golden: false
  provenance:
    authored_by: human
    spdx: MIT
  tags:
  - calibration_v0
  - golden_validated_via_iol_gate
  notes: Hard MCQ — the -b (before) flag, union directory semantics.
