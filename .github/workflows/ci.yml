name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Schema-validate items
        run: python -m infernode_bench validate
      - name: Subset hashes
        run: python -m infernode_bench subset hashes
      - name: Tests
        run: python -m pytest tests/ -v
      - name: Lint
        run: python -m ruff check infernode_bench tests
