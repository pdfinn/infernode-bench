  tags:
  - golden_validated_via_iol_gate
- id: c_bio_brdline_v1
  category: plan9_c
  difficulty: medium
  subcategory: bio
  language: c
  prompt: Write a Plan 9 C `main()` that reads stdin via `Bopen("/dev/stdin",
    OREAD)` (use `0` if Bopen of /dev/stdin doesn't apply — `Bfdopen(0, OREAD)`)
    and prints each line with its line number, then exits.
  grader:
    kind: compile_gate
    config:
      gate_lang: c
  golden:
    source: "#include <u.h>\n#include <libc.h>\n#include <bio.h>\n\nvoid\n\
      main(int, char**)\n{\n\tBiobuf *bp;\n\tchar *line;\n\tint n;\n\n\tbp\
      \ = Bfdopen(0, OREAD);\n\tif(bp == nil)\n\t\tsysfatal(\"Bfdopen: %r\"\
      );\n\tn = 1;\n\twhile((line = Brdstr(bp, '\\n', 1)) != nil) {\n\t\t\
      print(\"%d: %s\\n\", n++, line);\n\t\tfree(line);\n\t}\n\tBterm(bp);\n\
      \texits(0);\n}\n"
  notes: ''
  provenance:
    authored_by: human
    spdx: MIT
  needs_golden: false
  tags:
  - golden_validated_via_iol_gate
- id: c_werrstr_v1
  category: plan9_c
  difficulty: easy
  subcategory: errstr
  language: c
  prompt: Write a Plan 9 C function `must_be_positive(int n)` that, if `n`
    is not positive, calls `werrstr("must be positive, got %d", n)` and returns
    -1. Otherwise returns n. main() calls it with -3, checks the return value,
    and on -1 prints the errstr via `fprint(2, "%r\n")`.
  grader:
    kind: compile_gate
    config:
      gate_lang: c
  golden:
    source: "#include <u.h>\n#include <libc.h>\n\nint\nmust_be_positive(int\
      \ n)\n{\n\tif(n <= 0) {\n\t\twerrstr(\"must be positive, got %d\", n);\n\
      \t\treturn -1;\n\t}\n\treturn n;\n}\n\nvoid\nmain(int, char**)\n{\n\t\
      if(must_be_positive(-3) < 0)\n\t\tfprint(2, \"%r\\n\");\n\texits(0);\n\
      }\n"
  notes: ''
  provenance:
    authored_by: human
    spdx: MIT
  needs_golden: false
  tags:
  - golden_validated_via_iol_gate
- id: c_rerrstr_v1
  category: plan9_c
  difficulty: medium
  subcategory: errstr
  language: c
  prompt: 'Write a Plan 9 C function `peek_errstr(char *buf, int n)` that
    uses `rerrstr(buf, n)` to read the current error string without clearing
    it, and returns its length. main() calls open on a missing file, then
    peeks errstr and prints `err: <buf>`.'
  grader:
    kind: compile_gate
    config:
      gate_lang: c
  golden:
    source: "#include <u.h>\n#include <libc.h>\n\nint\npeek_errstr(char *buf,\
      \ int n)\n{\n\trerrstr(buf, n);\n\treturn strlen(buf);\n}\n\nvoid\n\
      main(int, char**)\n{\n\tchar buf[ERRMAX];\n\n\topen(\"/no/such/file\"\
      , OREAD);\n\tpeek_errstr(buf, sizeof buf);\n\tprint(\"err: %s\\n\",\
      \ buf);\n\texits(0);\n}\n"
  notes: ''
  provenance:
    authored_by: human
    spdx: MIT
  needs_golden: false
  tags:
  - golden_validated_via_iol_gate
- id: c_thread_chan_v1
  category: plan9_c
  difficulty: hard
  subcategory: thread
  language: c
  prompt: Write a Plan 9 C `threadmain()` (using libthread) that creates a
    `Channel` of int with `chancreate(sizeof(int), 0)`, spawns a thread that
    sends 42 on it, receives the value with `recv`, prints it, and `threadexitsall(nil)`.
  grader:
    kind: compile_gate
    config:
      gate_lang: c
  golden:
    source: "#include <u.h>\n#include <libc.h>\n#include <thread.h>\n\nstatic\
      \ void\nsender(void *aux)\n{\n\tChannel *c;\n\tint v;\n\n\tc = aux;\n\
      \tv = 42;\n\tsend(c, &v);\n\tthreadexits(nil);\n}\n\nvoid\nthreadmain(int,\
      \ char**)\n{\n\tChannel *c;\n\tint v;\n\n\tc = chancreate(sizeof(int),\
      \ 0);\n\tthreadcreate(sender, c, 8192);\n\trecv(c, &v);\n\tprint(\"\
      got %d\\n\", v);\n\tthreadexitsall(nil);\n}\n"
  notes: ''
  provenance:
    authored_by: human
    spdx: MIT
  needs_golden: false
  tags:
  - golden_validated_via_iol_gate
