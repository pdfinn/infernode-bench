- id: c_bio_stdin_v1
  category: plan9_c
  difficulty: easy
  subcategory: bio
  language: c
  prompt: 'Write a Plan 9 C `main()` that wraps standard input with `Binit(&bin,
    0, OREAD)`, reads one line via `Brdstr(&bin, ''\n'', 0)`, prints `got:
    <line>`, and frees the returned string with `free()`.'
  grader:
    kind: compile_gate
    config:
      gate_lang: c
  golden:
    source: "#include <u.h>\n#include <libc.h>\n#include <bio.h>\n\nvoid\n\
      main(int, char**)\n{\n\tBiobuf bin;\n\tchar *s;\n\n\tBinit(&bin, 0,\
      \ OREAD);\n\ts = Brdstr(&bin, '\\n', 0);\n\tif(s == nil)\n\t\tsysfatal(\"\
      Brdstr: %r\");\n\tprint(\"got: %s\\n\", s);\n\tfree(s);\n\texits(0);\n\
      }\n"
  notes: ''
  provenance:
    authored_by: human
    spdx: MIT
  needs_golden: false
  tags:
  - golden_validated_via_iol_gate
- id: c_bio_write_v1
