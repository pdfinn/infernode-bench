- id: c_fmtprint_buffer_v1
  category: plan9_c
  difficulty: medium
  subcategory: print
  language: c
  prompt: Write a Plan 9 C `main()` that uses `Fmt` to format the string `x=42`
    into a fixed buffer (use `fmtfdinit` against fd 1, then `fmtprint(&fmt,
    "x=%d\n", 42)`). Use lib9, no stdio.h.
  grader:
    kind: compile_gate
    config:
      gate_lang: c
  golden:
    source: "#include <u.h>\n#include <libc.h>\n\nvoid\nmain(int, char**)\n\
      {\n\tFmt fmt;\n\tchar buf[64];\n\n\tfmtfdinit(&fmt, 1, buf, sizeof buf);\n\
      \tfmtprint(&fmt, \"x=%d\\n\", 42);\n\tfmtfdflush(&fmt);\n\texits(0);\n\
      }\n"
  notes: ''
  provenance:
    authored_by: human
    spdx: MIT
  needs_golden: false
  tags:
  - golden_validated_via_iol_gate
