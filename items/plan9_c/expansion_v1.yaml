- id: c_dirstat_v1
  category: plan9_c
  difficulty: medium
  subcategory: dir
  language: c
  prompt: Write a Plan 9 C `main()` that calls `dirstat(argv[1])`, prints
    `name=<name> size=<size>` from the Dir result, frees the Dir, and exits.
    On dirstat failure use sysfatal.
  grader:
    kind: compile_gate
    config:
      gate_lang: c
  golden:
    source: "#include <u.h>\n#include <libc.h>\n\nvoid\nmain(int argc, char\
      \ **argv)\n{\n\tDir *d;\n\n\tif(argc < 2)\n\t\tsysfatal(\"usage: %s\
      \ file\", argv[0]);\n\td = dirstat(argv[1]);\n\tif(d == nil)\n\t\tsysfatal(\"\
      dirstat: %r\");\n\tprint(\"name=%s size=%lld\\n\", d->name, d->length);\n\
      \tfree(d);\n\texits(0);\n}\n"
  notes: ''
  provenance:
    authored_by: human
    spdx: MIT
  needs_golden: false
  tags:
  - golden_validated_via_iol_gate
- id: c_dirread_loop_v1
  category: plan9_c
  difficulty: medium
  subcategory: dir
  language: c
  prompt: Write a Plan 9 C `main()` that opens argv[1], reads entries via
    `dirread(fd, &dir)` in a loop (which returns count or 0 at end), and prints
    each entry's name. Free each batch.
  grader:
    kind: compile_gate
    config:
      gate_lang: c
  golden:
    source: "#include <u.h>\n#include <libc.h>\n\nvoid\nmain(int argc, char\
      \ **argv)\n{\n\tint fd, i;\n\tlong n;\n\tDir *d;\n\n\tif(argc < 2)\n\
      \t\tsysfatal(\"usage: %s dir\", argv[0]);\n\tfd = open(argv[1], OREAD);\n\
      \tif(fd < 0)\n\t\tsysfatal(\"open: %r\");\n\twhile((n = dirread(fd,\
      \ &d)) > 0) {\n\t\tfor(i = 0; i < n; i++)\n\t\t\tprint(\"%s\\n\", d[i].name);\n\
      \t\tfree(d);\n\t}\n\tclose(fd);\n\texits(0);\n}\n"
  notes: ''
  provenance:
    authored_by: human
    spdx: MIT
  needs_golden: false
  tags:
  - golden_validated_via_iol_gate
