- id: c_bio_read_v1
  category: plan9_c
  difficulty: medium
  language: c
  prompt: |
    Write a Plan 9 C `main()` that uses `Bopen` from libbio
    to open argv[1] for reading, calls `Brdline` in a loop,
    and prints each line. Free the `Biobuf` with `Bterm`
    when done.
  grader:
    kind: compile_gate
    config:
      gate_lang: c
  needs_golden: false
  provenance:
    authored_by: human
    spdx: MIT
    source_repo: infernode-os-llm@801df94d0b83
    derived_from: eval/scenarios/baseline_v2.yaml
  tags:
  - baseline_v2_migration
  - golden_validated_via_iol_gate
  golden:
    source: "#include <u.h>\n#include <libc.h>\n#include <bio.h>\n\nvoid\n\
      main(int argc, char **argv)\n{\n\tBiobuf *bp;\n\tchar *line;\n\n\tif(argc\
      \ < 2)\n\t\tsysfatal(\"usage: %s file\", argv[0]);\n\tbp = Bopen(argv[1],\
      \ OREAD);\n\tif(bp == nil)\n\t\tsysfatal(\"Bopen: %r\");\n\twhile((line\
      \ = Brdline(bp, '\\n')) != nil)\n\t\twrite(1, line, Blinelen(bp));\n\
      \tBterm(bp);\n\texits(0);\n}\n"
- id: c_fmt_install_v1
  category: plan9_c
  difficulty: medium
  language: c
  prompt: |
    Write a Plan 9 C function `mypoint_fmt(Fmt *f)` that
    implements the lib9 print/fmt protocol for a struct
    `Point { int x; int y; }`. Show how it would be
    registered with `fmtinstall('P', mypoint_fmt)`.
  grader:
    kind: compile_gate
    config:
      gate_lang: c
  needs_golden: false
  provenance:
    authored_by: human
    spdx: MIT
    source_repo: infernode-os-llm@801df94d0b83
    derived_from: eval/scenarios/baseline_v2.yaml
  tags:
  - baseline_v2_migration
  - golden_validated_via_iol_gate
  golden:
    source: "#include <u.h>\n#include <libc.h>\n\ntypedef struct Point Point;\n\
      struct Point {\n\tint x;\n\tint y;\n};\n\nint\nmypoint_fmt(Fmt *f)\n\
      {\n\tPoint p;\n\n\tp = va_arg(f->args, Point);\n\treturn fmtprint(f,\
      \ \"(%d,%d)\", p.x, p.y);\n}\n\nvoid\nmain(int, char**)\n{\n\tPoint\
      \ p;\n\n\tfmtinstall('P', mypoint_fmt);\n\tp.x = 3;\n\tp.y = 4;\n\t\
      print(\"%P\\n\", p);\n\texits(0);\n}\n"
- id: c_errstr_pattern_v1
  category: plan9_c
  difficulty: easy
  language: c
  prompt: |
    Write a Plan 9 C function `safe_open(char *name, int mode)`
    that calls `open(name, mode)`, and on failure preserves the
    errstr by calling `errstr(buf, sizeof buf)` then `werrstr`
    with extra context, returning -1.
  grader:
    kind: compile_gate
    config:
      gate_lang: c
  needs_golden: false
  provenance:
    authored_by: human
    spdx: MIT
    source_repo: infernode-os-llm@801df94d0b83
    derived_from: eval/scenarios/baseline_v2.yaml
  tags:
  - baseline_v2_migration
  - golden_validated_via_iol_gate
  golden:
    source: "#include <u.h>\n#include <libc.h>\n\nint\nsafe_open(char *name,\
      \ int mode)\n{\n\tint fd;\n\tchar buf[ERRMAX];\n\n\tfd = open(name,\
      \ mode);\n\tif(fd < 0) {\n\t\terrstr(buf, sizeof buf);\n\t\twerrstr(\"\
      safe_open %s: %s\", name, buf);\n\t\treturn -1;\n\t}\n\treturn fd;\n\
      }\n\nvoid\nmain(int, char**)\n{\n\tsafe_open(\"/no/such/file\", OREAD);\n\
      \texits(0);\n}\n"
