- id: c_sysfatal_v1
  category: plan9_c
  difficulty: easy
  language: c
  prompt: |
    Write a Plan 9 C `main()` that opens the file given as
    argv[1] for reading using `open()`, and on failure calls
    `sysfatal("open %s: %r", argv[1])`. On success it prints
    `ok\n` and exits.
  grader:
    kind: compile_gate
    config:
      gate_lang: c
  needs_golden: false
  provenance:
    authored_by: human
    spdx: MIT
    source_repo: infernode-os-llm@801df94d0b83
    derived_from: eval/scenarios/baseline_v2.yaml
  tags:
  - baseline_v2_migration
  - golden_validated_via_iol_gate
  golden:
    source: "#include <u.h>\n#include <libc.h>\n\nvoid\nmain(int argc, char\
      \ **argv)\n{\n\tint fd;\n\n\tif(argc < 2)\n\t\tsysfatal(\"usage: %s\
      \ file\", argv[0]);\n\tfd = open(argv[1], OREAD);\n\tif(fd < 0)\n\t\t\
      sysfatal(\"open %s: %r\", argv[1]);\n\tprint(\"ok\\n\");\n\tclose(fd);\n\
      \texits(0);\n}\n"
