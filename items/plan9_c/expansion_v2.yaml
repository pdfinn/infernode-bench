- id: c_seek_v1
  category: plan9_c
  difficulty: medium
  subcategory: io
  language: c
  prompt: Write a Plan 9 C `main()` that opens argv[1], seeks to offset 5
    (from start, mode 0), reads 10 bytes, and prints them.
  grader:
    kind: compile_gate
    config:
      gate_lang: c
  golden:
    source: "#include <u.h>\n#include <libc.h>\n\nvoid\nmain(int argc, char\
      \ **argv)\n{\n\tint fd, n;\n\tchar buf[16];\n\n\tif(argc < 2)\n\t\t\
      sysfatal(\"usage: %s file\", argv[0]);\n\tfd = open(argv[1], OREAD);\n\
      \tif(fd < 0)\n\t\tsysfatal(\"open: %r\");\n\tif(seek(fd, 5, 0) < 0)\n\
      \t\tsysfatal(\"seek: %r\");\n\tn = read(fd, buf, sizeof buf - 1);\n\t\
      if(n > 0) {\n\t\tbuf[n] = 0;\n\t\tprint(\"%s\\n\", buf);\n\t}\n\tclose(fd);\n\
      \texits(0);\n}\n"
  notes: ''
  provenance:
    authored_by: human
    spdx: MIT
  needs_golden: false
  tags:
  - golden_validated_via_iol_gate
