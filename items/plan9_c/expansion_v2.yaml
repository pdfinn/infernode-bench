- id: c_rfork_v1
  category: plan9_c
  difficulty: hard
  subcategory: process
  language: c
  prompt: Write a Plan 9 C `main()` that calls `rfork(RFPROC|RFFDG)` to create
    a new process. Both halves print `parent` and `child` respectively. The
    parent then exits.
  grader:
    kind: compile_gate
    config:
      gate_lang: c
  golden:
    source: "#include <u.h>\n#include <libc.h>\n\nvoid\nmain(int, char**)\n\
      {\n\tswitch(rfork(RFPROC|RFFDG|RFNOWAIT)) {\n\tcase -1:\n\t\tsysfatal(\"\
      rfork: %r\");\n\tcase 0:\n\t\tprint(\"child\\n\");\n\t\texits(0);\n\t\
      default:\n\t\tprint(\"parent\\n\");\n\t}\n\texits(0);\n}\n"
  notes: ''
  provenance:
    authored_by: human
    spdx: MIT
  needs_golden: false
  tags:
  - golden_validated_via_iol_gate
- id: c_str_dup_then_split_v1
  category: plan9_c
  difficulty: medium
  subcategory: stdlib
  language: c
  prompt: Write a Plan 9 C function `count_segs(char *s, char sep)` that uses
    `strdup` + `strtok` to count the number of separated segments in `s`.
    main() calls it on `"a:b:c:d"` with `:` and prints the count.
  grader:
    kind: compile_gate
    config:
      gate_lang: c
  golden:
    source: "#include <u.h>\n#include <libc.h>\n\nint\ncount_segs(char *s,\
      \ char sep)\n{\n\tchar *dup, *p, sepbuf[2];\n\tint n;\n\n\tdup = strdup(s);\n\
      \tif(dup == nil)\n\t\treturn -1;\n\tsepbuf[0] = sep;\n\tsepbuf[1] =\
      \ 0;\n\tn = 0;\n\tfor(p = strtok(dup, sepbuf); p != nil; p = strtok(nil,\
      \ sepbuf))\n\t\tn++;\n\tfree(dup);\n\treturn n;\n}\n\nvoid\nmain(int,\
      \ char**)\n{\n\tprint(\"%d\\n\", count_segs(\"a:b:c:d\", ':'));\n\t\
      exits(0);\n}\n"
  notes: ''
  provenance:
    authored_by: human
    spdx: MIT
  needs_golden: false
  tags:
  - golden_validated_via_iol_gate
