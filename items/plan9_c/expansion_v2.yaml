- id: c_atoi_v1
  category: plan9_c
  difficulty: easy
  subcategory: stdlib
  language: c
  prompt: Write a Plan 9 C `main()` that takes argv[1], converts it to an
    integer via `atoi`, multiplies by 2, and prints the result.
  grader:
    kind: compile_gate
    config:
      gate_lang: c
  golden:
    source: "#include <u.h>\n#include <libc.h>\n\nvoid\nmain(int argc, char\
      \ **argv)\n{\n\tint n;\n\n\tif(argc < 2)\n\t\tsysfatal(\"usage: %s N\"\
      , argv[0]);\n\tn = atoi(argv[1]);\n\tprint(\"%d\\n\", n * 2);\n\texits(0);\n\
      }\n"
  notes: ''
  provenance:
    authored_by: human
    spdx: MIT
  needs_golden: false
  tags:
  - golden_validated_via_iol_gate
