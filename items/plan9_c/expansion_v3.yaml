- id: c_args_parse_v1
  category: plan9_c
  difficulty: medium
  subcategory: system
  language: c
  prompt: 'Write a Plan 9 C `main()` that uses the canonical `ARGBEGIN`/`ARGEND`
    macros to parse flags: `-v` for verbose, `-n N` for a count. Print `verbose=<0|1>
    count=<N>` then exit.'
  grader:
    kind: compile_gate
    config:
      gate_lang: c
  golden:
    source: "#include <u.h>\n#include <libc.h>\n\nvoid\nmain(int argc, char\
      \ **argv)\n{\n\tint verbose;\n\tint count;\n\n\tverbose = 0;\n\tcount\
      \ = 0;\n\tARGBEGIN {\n\tcase 'v':\n\t\tverbose = 1;\n\t\tbreak;\n\t\
      case 'n':\n\t\tcount = atoi(EARGF(sysfatal(\"usage\")));\n\t\tbreak;\n\
      \t} ARGEND;\n\tprint(\"verbose=%d count=%d\\n\", verbose, count);\n\t\
      exits(0);\n}\n"
  notes: ''
  provenance:
    authored_by: human
    spdx: MIT
  needs_golden: false
  tags:
  - golden_validated_via_iol_gate
