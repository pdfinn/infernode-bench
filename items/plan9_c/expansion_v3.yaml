- id: c_create_file_v1
  category: plan9_c
  difficulty: easy
  subcategory: io
  language: c
  prompt: Write a Plan 9 C `main()` that creates `/tmp/p9-test` with mode
    0644 using `create`, writes the string `created\n`, and closes.
  grader:
    kind: compile_gate
    config:
      gate_lang: c
  golden:
    source: "#include <u.h>\n#include <libc.h>\n\nvoid\nmain(int, char**)\n\
      {\n\tint fd;\n\n\tfd = create(\"/tmp/p9-test\", OWRITE, 0644);\n\tif(fd\
      \ < 0)\n\t\tsysfatal(\"create: %r\");\n\twrite(fd, \"created\\n\", 8);\n\
      \tclose(fd);\n\texits(0);\n}\n"
  notes: ''
  provenance:
    authored_by: human
    spdx: MIT
  needs_golden: false
  tags:
  - golden_validated_via_iol_gate
- id: c_bigbuf_loop_v1
  category: plan9_c
  difficulty: medium
  subcategory: io
  language: c
  prompt: Write a Plan 9 C `main()` that copies stdin to stdout in chunks
    of 4096 bytes using read+write until read returns 0. On read or write
    error use sysfatal.
  grader:
    kind: compile_gate
    config:
      gate_lang: c
  golden:
    source: "#include <u.h>\n#include <libc.h>\n\nvoid\nmain(int, char**)\n\
      {\n\tchar buf[4096];\n\tlong n;\n\n\twhile((n = read(0, buf, sizeof\
      \ buf)) > 0) {\n\t\tif(write(1, buf, n) != n)\n\t\t\tsysfatal(\"write:\
      \ %r\");\n\t}\n\tif(n < 0)\n\t\tsysfatal(\"read: %r\");\n\texits(0);\n\
      }\n"
  notes: ''
  provenance:
    authored_by: human
    spdx: MIT
  needs_golden: false
  tags:
  - golden_validated_via_iol_gate
