items:
- id: fs_styx_versus_9p2000_v1
  category: fs_concepts
  difficulty: medium
  subcategory: 9p_proto
  language: none
  prompt: |-
    What is the practical difference between 'Styx' (Inferno's 9P implementation) and '9P2000' (the Plan 9 version)?
    A) Styx uses a 64-bit message size field; 9P2000 uses 32-bit
    B) Styx is the same wire protocol with minor message-layout tweaks; the Tversion handshake declares which dialect is in use
    C) They are completely incompatible protocols
    D) Styx uses TCP; 9P2000 uses Unix sockets
  grader:
    kind: mcq
    config:
      choices:
      - a
      - b
      - c
      - d
  golden:
    answer: B
  notes: ''
  provenance:
    authored_by: human
    spdx: MIT
  needs_golden: false
  tags: []
