- id: fs_dirread_partial_v1
  category: fs_concepts
  difficulty: hard
  subcategory: 9p_proto
  language: none
  prompt: |-
    A Tread on a directory MUST return complete Stat entries — a partial Stat at the end of a Rread is:
    A) An error condition
    B) Acceptable; the client must concatenate across multiple Rreads
    C) Forbidden by the spec — the server must align reads to whole Stats
    D) Truncated at the next walk
