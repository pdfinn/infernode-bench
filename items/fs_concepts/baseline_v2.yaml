- id: fs_text_line_format_v1
  category: fs_concepts
  difficulty: easy
  language: none
  prompt: |
    Write a complete, compilable Limbo program that reads
    `/n/fleet/vehicles` (a 9P file in InferNode's text-line
    data convention: one record per line, fields separated by
    spaces) and prints just the first and fourth field of each
    record. Use `sys->tokenize`.
  grader:
    kind: judge
    config:
      criteria:
      - accuracy
      - uses_canonical_terminology
      - concrete_example
  needs_golden: true
  provenance:
    authored_by: human
    spdx: MIT
    source_repo: infernode-os-llm@801df94d0b83
    derived_from: eval/scenarios/baseline_v2.yaml
  tags:
  - baseline_v2_migration
