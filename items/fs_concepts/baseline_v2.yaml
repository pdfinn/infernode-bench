- id: fs_clone_pattern_v1
  category: fs_concepts
  difficulty: medium
  language: none
  prompt: |
    In Inferno, `/n/llm/new` is a "clone" file: opening it
    allocates a new session and reads return the session id.
    Subsequent operations happen under `/n/llm/<id>/ask`.
    Write a complete, compilable Limbo program that opens the
    clone file, reads the id, then writes "what is 9P?" to the
    session's `ask` file and reads the reply.
  grader:
    kind: judge
    config:
      criteria:
      - accuracy
      - uses_canonical_terminology
      - concrete_example
  needs_golden: true
  provenance:
    authored_by: human
    spdx: MIT
    source_repo: infernode-os-llm@801df94d0b83
    derived_from: eval/scenarios/baseline_v2.yaml
  tags:
  - baseline_v2_migration
- id: fs_bind_namespace_v1
  category: fs_concepts
  difficulty: easy
  language: none
  prompt: |
    Write rc that constructs a custom namespace for an agent:
    bind `/n/sensors` (read-only) at the start of `/dev`,
    bind `/n/comms/chat` after `/dev`, and unmount everything
    under `/srv` first to start clean.
  grader:
    kind: judge
    config:
      criteria:
