  tags:
  - baseline_v2_migration
- id: fs_ctl_data_status_v1
  category: fs_concepts
  difficulty: medium
  language: none
  prompt: |
    Write the .m interface file (`audio.m`) for a Limbo module
    that wraps a 9P audio device exposing the canonical
    ctl/data/status decomposition: `ctl` for write commands,
    `data` for read/write of audio bytes, `status` for read of
    current state. Define functions to open, send a ctl
    command, read a status field, and stream data.
  grader:
    kind: judge
    config:
      criteria:
      - accuracy
      - uses_canonical_terminology
      - concrete_example
  needs_golden: true
  provenance:
    authored_by: human
    spdx: MIT
    source_repo: infernode-os-llm@801df94d0b83
    derived_from: eval/scenarios/baseline_v2.yaml
  tags:
  - baseline_v2_migration
- id: fs_mountpoint_introspection_v1
  category: fs_concepts
  difficulty: easy
  language: none
  prompt: |
    Write rc that lists every mount point currently in the
    namespace by reading `/proc/$pid/ns` (Inferno exposes the
    current namespace at this path). For the running shell,
    this means `/proc/$pid/ns` where `$pid` is `$apid`.
  grader:
    kind: judge
    config:
      criteria:
      - accuracy
      - uses_canonical_terminology
      - concrete_example
  needs_golden: true
  provenance:
    authored_by: human
