- id: fs_open_with_orclose_v1
  category: fs_concepts
  difficulty: medium
  subcategory: 9p_proto
  language: limbo
  prompt: Write a complete, compilable Limbo program that creates `/tmp/temp-orclose`
    for writing, opens it with the `Sys->ORCLOSE` flag OR'd in so the file
    is removed when closed. Print `created with orclose`. The actual removal
    happens implicitly on fd close.
  grader:
    kind: compile_gate
    config:
      gate_lang: limbo
  golden:
    source: "implement L;\ninclude \"sys.m\";\ninclude \"draw.m\";\nsys: Sys;\n\
      L: module { init: fn(nil: ref Draw->Context, argv: list of string);\
      \ };\ninit(nil: ref Draw->Context, nil: list of string)\n{\n\tsys =\
      \ load Sys Sys->PATH;\n\tfd := sys->create(\"/tmp/temp-orclose\", Sys->OWRITE\
      \ | Sys->ORCLOSE, 8r644);\n\tif (fd == nil) {\n\t\tsys->fprint(sys->fildes(2),\
      \ \"create: %r\\n\");\n\t\treturn;\n\t}\n\tsys->print(\"created with\
      \ orclose\\n\");\n}\n"
  provenance:
    authored_by: human
    spdx: MIT
  needs_golden: false
  tags:
  - golden_validated_via_iol_gate
- id: fs_namespace_dup_v1
  category: fs_concepts
  difficulty: hard
  subcategory: namespace
  language: limbo
  prompt: Write a complete, compilable Limbo program that uses sys->pctl with
    `Sys->NEWNS` to copy-on-write fork the namespace, then binds `/n/local`
    over `/tmp`. The subsequent process sees the modified namespace; the caller
    does not. Print `forked namespace`.
  grader:
    kind: compile_gate
    config:
      gate_lang: limbo
  golden:
    source: "implement L;\ninclude \"sys.m\";\ninclude \"draw.m\";\nsys: Sys;\n\
      L: module { init: fn(nil: ref Draw->Context, argv: list of string);\
      \ };\ninit(nil: ref Draw->Context, nil: list of string)\n{\n\tsys =\
      \ load Sys Sys->PATH;\n\tsys->pctl(Sys->NEWNS, nil);\n\tsys->bind(\"\
      /n/local\", \"/tmp\", Sys->MREPL);\n\tsys->print(\"forked namespace\\\
      n\");\n}\n"
  provenance:
    authored_by: human
    spdx: MIT
  needs_golden: false
  tags:
  - golden_validated_via_iol_gate
