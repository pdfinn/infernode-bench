- id: fs_chan_file_v1
  category: fs_concepts
  difficulty: medium
  subcategory: 9p_proto
  language: none
  prompt: |-
    Inferno's `sys-file2chan(2)` allows a Limbo program to:
    A) Convert a file descriptor to a channel
    B) Synthesise a 9P file backed by Limbo channels — reads of the file become receives on a chan, writes become sends
    C) Read a file into memory as a single chunk
    D) Convert a chan of byte to a writable file in /tmp
  grader:
    kind: mcq
    config:
      choices:
      - a
      - b
      - c
      - d
  golden:
    answer: B
  notes: ''
  provenance:
    authored_by: human
    spdx: MIT
  needs_golden: false
