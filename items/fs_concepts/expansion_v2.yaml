- id: fs_pctl_newns_v1
  category: fs_concepts
  difficulty: hard
  subcategory: namespace
  language: none
  prompt: |-
    After `sys->pctl(Sys->NEWNS, nil)`, what happens to the calling thread's namespace?
    A) It is cleared to empty
    B) It becomes a copy-on-write fork of the previous namespace
    C) It is replaced by the kernel's default namespace
    D) It is shared with all sibling threads in the same proc
  grader:
    kind: mcq
    config:
      choices:
      - a
      - b
      - c
      - d
  golden:
    answer: B
  notes: ''
  provenance:
    authored_by: human
    spdx: MIT
  needs_golden: false
  tags: []
