items:
- id: fs_styx_path_v1
  category: fs_concepts
  difficulty: medium
  subcategory: 9p_proto
  language: none
  prompt: |-
    Inferno's 9P implementation module is conventionally named:
    A) `proto.m`
    B) `9p.m`
    C) `styx.m`
    D) `srv.m`
  grader:
    kind: mcq
    config:
      choices:
      - a
      - b
      - c
      - d
  golden:
    answer: C
  notes: Inferno calls 9P 'Styx' in its module naming; the protocol is the
    same.
  provenance:
    authored_by: human
    spdx: MIT
  needs_golden: false
  tags: []
