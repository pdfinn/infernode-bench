- id: fs_ctl_send_command_v1
  category: fs_concepts
  difficulty: easy
  subcategory: ctl_data
  language: limbo
  prompt: 'Write a complete, compilable Limbo program that opens `/dev/audio/ctl`
    for writing and writes the command `volume 80` to it. On open failure,
    print `ctl open: %r` to stderr and exit cleanly.'
  grader:
    kind: compile_gate
    config:
      gate_lang: limbo
  golden:
    source: "implement F;\ninclude \"sys.m\";\ninclude \"draw.m\";\nsys: Sys;\n\
      F: module { init: fn(nil: ref Draw->Context, argv: list of string);\
      \ };\ninit(nil: ref Draw->Context, nil: list of string)\n{\n\tsys =\
      \ load Sys Sys->PATH;\n\tfd := sys->open(\"/dev/audio/ctl\", Sys->OWRITE);\n\
      \tif (fd == nil) {\n\t\tsys->fprint(sys->fildes(2), \"ctl open: %r\\\
      n\");\n\t\treturn;\n\t}\n\tcmd := array of byte \"volume 80\";\n\tsys->write(fd,\
      \ cmd, len cmd);\n}\n"
  notes: ''
  provenance:
    authored_by: human
    spdx: MIT
  needs_golden: false
  tags:
  - golden_validated_via_iol_gate
- id: fs_read_status_lines_v1
  category: fs_concepts
  difficulty: medium
  subcategory: ctl_data
  language: limbo
  prompt: Write a complete, compilable Limbo program that reads `/dev/audio/status`
    line-by-line using bufio and prints each line. Use bufio->open with bufio->OREAD.
  grader:
    kind: compile_gate
    config:
      gate_lang: limbo
  golden:
    source: "implement F;\ninclude \"sys.m\";\ninclude \"draw.m\";\ninclude\
      \ \"bufio.m\";\nsys: Sys;\nbufio: Bufio;\nIobuf: import bufio;\nF: module\
      \ { init: fn(nil: ref Draw->Context, argv: list of string); };\ninit(nil:\
      \ ref Draw->Context, nil: list of string)\n{\n\tsys = load Sys Sys->PATH;\n\
      \tbufio = load Bufio Bufio->PATH;\n\tf := bufio->open(\"/dev/audio/status\"\
      , Bufio->OREAD);\n\tif (f == nil)\n\t\treturn;\n\twhile ((line := f.gets('\\\
      n')) != nil)\n\t\tsys->print(\"%s\", line);\n}\n"
  notes: ''
  provenance:
    authored_by: human
    spdx: MIT
  needs_golden: false
  tags:
  - golden_validated_via_iol_gate
