- id: fs_walk_before_open_v1
  category: fs_concepts
  difficulty: easy
  subcategory: 9p_proto
  language: none
  prompt: |-
    In the 9P protocol, which of the following sequences is correct for opening a file at `/dir/file`?
    A) Tattach → Topen(/dir/file)
    B) Tattach → Twalk("dir", "file") → Topen(fid)
    C) Tattach → Topen("/dir/file") → Twalk(fid)
    D) Topen(fid) → Tattach → Twalk(fid)
  grader:
    kind: mcq
    config:
      choices:
      - a
      - b
      - c
      - d
  golden:
    answer: B
  notes: ''
  provenance:
    authored_by: human
    spdx: MIT
  needs_golden: false
  tags: []
