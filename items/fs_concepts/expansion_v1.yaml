- id: fs_proc_self_args_v1
  category: fs_concepts
  difficulty: medium
  subcategory: conventions
  language: limbo
  prompt: Write a complete, compilable Limbo program that reads `/prog/$apid/args`
    (the current process's argv file) and prints the contents.
  grader:
    kind: compile_gate
    config:
      gate_lang: limbo
  golden:
    source: "implement F;\ninclude \"sys.m\";\ninclude \"draw.m\";\nsys: Sys;\n\
      F: module { init: fn(nil: ref Draw->Context, argv: list of string);\
      \ };\ninit(nil: ref Draw->Context, nil: list of string)\n{\n\tsys =\
      \ load Sys Sys->PATH;\n\tpid := sys->pctl(0, nil);\n\tpath := sys->sprint(\"\
      /prog/%d/args\", pid);\n\tfd := sys->open(path, Sys->OREAD);\n\tif (fd\
      \ == nil)\n\t\treturn;\n\tbuf := array[4096] of byte;\n\tn := sys->read(fd,\
      \ buf, len buf);\n\tif (n > 0)\n\t\tsys->print(\"%s\\n\", string buf[:n]);\n\
      }\n"
  notes: ''
  provenance:
    authored_by: human
    spdx: MIT
  needs_golden: false
  tags:
  - golden_validated_via_iol_gate
