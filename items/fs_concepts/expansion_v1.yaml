- id: fs_namespace_inherit_v1
  category: fs_concepts
  difficulty: hard
  subcategory: namespace
  language: none
  prompt: |-
    When an Inferno process `spawn`s a child thread, the child's namespace is:
    A) An empty namespace
    B) A shared reference to the parent's namespace — mutations in one are visible in the other unless `pctl()` is used to copy-on-write
    C) A deep snapshot of the parent's namespace, fully decoupled
    D) The system root, not the parent's namespace
  grader:
    kind: mcq
    config:
      choices:
      - a
      - b
      - c
      - d
  golden:
    answer: B
  notes: Tests `pctl` / NEWNS semantics.
  provenance:
    authored_by: human
    spdx: MIT
  needs_golden: false
  tags: []
