items:
- id: limbo_strings_are_bytes_v1
  category: limbo_authoring
  difficulty: medium
  subcategory: go_vs_limbo
  language: limbo
  prompt: Write a complete, compilable Limbo program that indexes the string
    `"hello"` at position 1 using subscript syntax. Note Limbo strings index
    as 16-bit *characters* (runes), NOT bytes. Print the decimal value of
    `s[1]`.
  grader:
    kind: compile_gate
    config:
      gate_lang: limbo
  golden:
    source: "implement L;\ninclude \"sys.m\";\ninclude \"draw.m\";\nsys: Sys;\n\
      L: module { init: fn(nil: ref Draw->Context, argv: list of string);\
      \ };\ninit(nil: ref Draw->Context, nil: list of string)\n{\n\tsys =\
      \ load Sys Sys->PATH;\n\ts := \"hello\";\n\tsys->print(\"%d\\n\", s[1]);\n\
      }\n"
  notes: In Limbo `s[1]` for s = "hello" is 101 (lowercase 'e' rune).
  provenance:
    authored_by: human
    spdx: MIT
  needs_golden: false
  tags:
  - golden_validated_via_iol_gate
- id: limbo_no_auto_struct_v1
  category: limbo_authoring
  difficulty: medium
  subcategory: go_vs_limbo
  language: limbo
  prompt: 'Limbo ADTs are value types unless made `ref`. Write a program that
    defines `Point: adt { x, y: int; }`. `init` makes a non-ref `p := Point(3,
    4);`, passes it to a function `move(p: Point, dx, dy: int): Point` that
    returns a NEW Point — modifying the parameter won''t affect the caller''s.
    Print the moved point''s x/y.'
  grader:
    kind: compile_gate
    config:
      gate_lang: limbo
  golden:
    source: "implement L;\ninclude \"sys.m\";\ninclude \"draw.m\";\nsys: Sys;\n\
      L: module { init: fn(nil: ref Draw->Context, argv: list of string);\
      \ };\nPoint: adt { x, y: int; };\nmove(p: Point, dx, dy: int): Point\n\
      {\n\tp.x += dx;\n\tp.y += dy;\n\treturn p;\n}\ninit(nil: ref Draw->Context,\
      \ nil: list of string)\n{\n\tsys = load Sys Sys->PATH;\n\tp := Point(3,\
      \ 4);\n\tq := move(p, 10, 20);\n\tsys->print(\"orig=%d,%d  moved=%d,%d\\\
      n\", p.x, p.y, q.x, q.y);\n}\n"
  notes: ''
  provenance:
    authored_by: human
    spdx: MIT
  needs_golden: false
  tags:
  - golden_validated_via_iol_gate
