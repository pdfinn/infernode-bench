    `init(nil: ref Draw->Context, argv: list of string)` entry point.
  grader:
    kind: compile_gate
    config:
      gate_lang: limbo
  needs_golden: false
  provenance:
    authored_by: human
    spdx: MIT
    source_repo: infernode-os-llm@801df94d0b83
    derived_from: eval/scenarios/baseline_v2.yaml
  tags:
  - baseline_v2_migration
  - golden_validated_via_iol_gate
  golden:
    source: "implement Wcl;\n\ninclude \"sys.m\";\ninclude \"draw.m\";\ninclude\
      \ \"bufio.m\";\n\nsys: Sys;\nbufio: Bufio;\nIobuf: import bufio;\n\n\
      Wcl: module\n{\n\tinit: fn(nil: ref Draw->Context, argv: list of string);\n\
      };\n\ninit(nil: ref Draw->Context, nil: list of string)\n{\n\tsys =\
      \ load Sys Sys->PATH;\n\tbufio = load Bufio Bufio->PATH;\n\n\tstdin\
      \ := bufio->fopen(sys->fildes(0), Bufio->OREAD);\n\tn := 0;\n\twhile\
      \ ((line := stdin.gets('\\n')) != nil) {\n\t\tn++;\n\t}\n\tsys->print(\"\
      %d\\n\", n);\n}\n"
- id: cat_v1
  category: limbo_authoring
  difficulty: easy
  language: limbo
  prompt: |
    Write a complete, compilable Limbo command "Cat" that
    concatenates each file named in argv to stdout. If argv is
    empty, copy stdin to stdout. Use sys->open and sys->read /
    sys->write for the copy.
  grader:
    kind: compile_gate
    config:
      gate_lang: limbo
  needs_golden: false
  provenance:
    authored_by: human
    spdx: MIT
    source_repo: infernode-os-llm@801df94d0b83
    derived_from: eval/scenarios/baseline_v2.yaml
  tags:
  - baseline_v2_migration
  - golden_validated_via_iol_gate
  golden:
    source: "implement Cat;\n\ninclude \"sys.m\";\ninclude \"draw.m\";\n\n\
      sys: Sys;\n\nCat: module\n{\n\tinit: fn(nil: ref Draw->Context, argv:\
      \ list of string);\n};\n\ncopy(fd: ref Sys->FD)\n{\n\tbuf := array[8192]\
      \ of byte;\n\tfor (;;) {\n\t\tn := sys->read(fd, buf, len buf);\n\t\t\
      if (n <= 0)\n\t\t\tbreak;\n\t\tsys->write(sys->fildes(1), buf, n);\n\
      \t}\n}\n\ninit(nil: ref Draw->Context, argv: list of string)\n{\n\t\
      sys = load Sys Sys->PATH;\n\tif (argv != nil)\n\t\targv = tl argv;\n\
      \tif (argv == nil) {\n\t\tcopy(sys->fildes(0));\n\t\treturn;\n\t}\n\t\
      while (argv != nil) {\n\t\tname := hd argv;\n\t\tfd := sys->open(name,\
      \ Sys->OREAD);\n\t\tif (fd != nil)\n\t\t\tcopy(fd);\n\t\targv = tl argv;\n\
      \t}\n}\n"
- id: alt_demux_v1
  category: limbo_authoring
  difficulty: medium
  language: limbo
  prompt: |
    Write a complete, compilable Limbo source file that defines
    an `init` function which:
      - creates two `chan of string` named `a` and `b`
      - spawns a worker that sends "from a" on `a`
      - spawns another worker that sends "from b" on `b`
      - in the main thread, uses an `alt` block to receive from
        whichever arrives first and print it to stdout
      - exits after one such receive
  grader:
    kind: compile_gate
    config:
      gate_lang: limbo
  needs_golden: false
  provenance:
    authored_by: human
    spdx: MIT
    source_repo: infernode-os-llm@801df94d0b83
    derived_from: eval/scenarios/baseline_v2.yaml
  tags:
  - baseline_v2_migration
  - golden_validated_via_iol_gate
  golden:
    source: "implement AltDemux;\n\ninclude \"sys.m\";\ninclude \"draw.m\"\
      ;\n\nsys: Sys;\n\nAltDemux: module\n{\n\tinit: fn(nil: ref Draw->Context,\
      \ argv: list of string);\n};\n\nsender(c: chan of string, s: string)\n\
      {\n\tc <-= s;\n}\n\ninit(nil: ref Draw->Context, nil: list of string)\n\
      {\n\tsys = load Sys Sys->PATH;\n\ta := chan of string;\n\tb := chan\
      \ of string;\n\tspawn sender(a, \"from a\");\n\tspawn sender(b, \"from\
      \ b\");\n\talt {\n\t\tx := <- a =>\n\t\t\tsys->print(\"%s\\n\", x);\n\
      \t\ty := <- b =>\n\t\t\tsys->print(\"%s\\n\", y);\n\t}\n}\n"
