- id: chan_pipeline_v1
  category: limbo_authoring
  difficulty: hard
  language: limbo
  prompt: |
    Write a complete, compilable Limbo source file in which `init`
    builds a small pipeline of channels: one worker generates the
    integers 1..5 onto a `chan of int`, a second worker reads
    them, doubles each, and writes onto a second `chan of int`,
    and the main thread reads the second channel until EOF
    (sender closes by sending a sentinel of -1) and prints each
    doubled value on its own line.
  grader:
    kind: compile_gate
    config:
      gate_lang: limbo
  needs_golden: false
  provenance:
    authored_by: human
    spdx: MIT
    source_repo: infernode-os-llm@801df94d0b83
    derived_from: eval/scenarios/baseline_v2.yaml
  tags:
  - baseline_v2_migration
  - golden_validated_via_iol_gate
  golden:
    source: "implement ChanPipeline;\n\ninclude \"sys.m\";\ninclude \"draw.m\"\
      ;\n\nsys: Sys;\n\nChanPipeline: module\n{\n\tinit: fn(nil: ref Draw->Context,\
      \ argv: list of string);\n};\n\ngen(out: chan of int)\n{\n\tfor (i :=\
      \ 1; i <= 5; i++)\n\t\tout <-= i;\n\tout <-= -1;\n}\n\ndouble(in: chan\
      \ of int, out: chan of int)\n{\n\tfor (;;) {\n\t\tv := <- in;\n\t\t\
      if (v < 0) {\n\t\t\tout <-= -1;\n\t\t\treturn;\n\t\t}\n\t\tout <-= v\
      \ * 2;\n\t}\n}\n\ninit(nil: ref Draw->Context, nil: list of string)\n\
      {\n\tsys = load Sys Sys->PATH;\n\ta := chan of int;\n\tb := chan of\
      \ int;\n\tspawn gen(a);\n\tspawn double(a, b);\n\tfor (;;) {\n\t\tv\
      \ := <- b;\n\t\tif (v < 0)\n\t\t\tbreak;\n\t\tsys->print(\"%d\\n\",\
      \ v);\n\t}\n}\n"
