- id: chan_pipeline_v1
  category: limbo_authoring
  difficulty: hard
  language: limbo
  prompt: |
    Write a complete, compilable Limbo source file in which `init`
    builds a small pipeline of channels: one worker generates the
    integers 1..5 onto a `chan of int`, a second worker reads
    them, doubles each, and writes onto a second `chan of int`,
    and the main thread reads the second channel until EOF
    (sender closes by sending a sentinel of -1) and prints each
    doubled value on its own line.
  grader:
    kind: compile_gate
    config:
