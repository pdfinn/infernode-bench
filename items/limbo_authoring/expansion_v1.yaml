- id: limbo_errstr_propagate_v1
  category: limbo_authoring
  difficulty: medium
  subcategory: error_handling
  language: limbo
  prompt: 'Write a complete, compilable Limbo program that tries to open `/no/such/path`
    for reading. On nil, it formats and prints `open failed: %r` (where `%r`
    resolves to sys->errstr) and raises `"fail:open"`. Wrap in an exception
    handler that catches `"fail:*"` and exits cleanly.'
  grader:
    kind: compile_gate
    config:
      gate_lang: limbo
  golden:
    source: "implement L;\ninclude \"sys.m\";\ninclude \"draw.m\";\nsys: Sys;\n\
      L: module { init: fn(nil: ref Draw->Context, argv: list of string);\
      \ };\ninit(nil: ref Draw->Context, nil: list of string)\n{\n\tsys =\
      \ load Sys Sys->PATH;\n\t{\n\t\tfd := sys->open(\"/no/such/path\", Sys->OREAD);\n\
      \t\tif (fd == nil) {\n\t\t\tsys->fprint(sys->fildes(2), \"open failed:\
      \ %r\\n\");\n\t\t\traise \"fail:open\";\n\t\t}\n\t} exception e {\n\t\
      \t\"fail:*\" => return;\n\t}\n}\n"
  notes: ''
  tags:
  - golden_validated_via_iol_gate
  provenance:
    authored_by: human
    spdx: MIT
  needs_golden: false
