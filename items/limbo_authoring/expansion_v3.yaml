- id: limbo_break_continue_v1
  category: limbo_authoring
  difficulty: easy
  subcategory: control
  language: limbo
  prompt: 'Write a complete, compilable Limbo program with `init` that iterates
    i = 1..10 in a for-loop. If i is even, continue. If i > 7, break. Otherwise
    print i. Output should be: 1, 3, 5, 7.'
  grader:
    kind: compile_gate
    config:
      gate_lang: limbo
  golden:
    source: "implement L;\ninclude \"sys.m\";\ninclude \"draw.m\";\nsys: Sys;\n\
      L: module { init: fn(nil: ref Draw->Context, argv: list of string);\
      \ };\ninit(nil: ref Draw->Context, nil: list of string)\n{\n\tsys =\
      \ load Sys Sys->PATH;\n\tfor (i := 1; i <= 10; i++) {\n\t\tif (i % 2\
      \ == 0) continue;\n\t\tif (i > 7) break;\n\t\tsys->print(\"%d\\n\",\
      \ i);\n\t}\n}\n"
  notes: ''
  provenance:
    authored_by: human
    spdx: MIT
  needs_golden: false
  tags:
  - golden_validated_via_iol_gate
- id: limbo_case_int_v1
  category: limbo_authoring
  difficulty: easy
  subcategory: control
  language: limbo
  prompt: 'Write a complete, compilable Limbo program with a function `name_for(d:
    int): string` that uses `case` to return `mon`, `tue`, `wed`, or `?` for
    inputs 1, 2, 3, anything else. `init` calls it on 1, 2, 4 and prints each.'
  grader:
    kind: compile_gate
    config:
      gate_lang: limbo
  golden:
    source: "implement L;\ninclude \"sys.m\";\ninclude \"draw.m\";\nsys: Sys;\n\
      L: module { init: fn(nil: ref Draw->Context, argv: list of string);\
      \ };\nname_for(d: int): string\n{\n\tcase d {\n\t\t1 => return \"mon\"\
      ;\n\t\t2 => return \"tue\";\n\t\t3 => return \"wed\";\n\t\t* => return\
      \ \"?\";\n\t}\n\treturn \"\";\n}\ninit(nil: ref Draw->Context, nil:\
      \ list of string)\n{\n\tsys = load Sys Sys->PATH;\n\tsys->print(\"%s\\\
      n\", name_for(1));\n\tsys->print(\"%s\\n\", name_for(2));\n\tsys->print(\"\
      %s\\n\", name_for(4));\n}\n"
  notes: ''
  provenance:
    authored_by: human
    spdx: MIT
  needs_golden: false
  tags:
  - golden_validated_via_iol_gate
- id: limbo_case_string_v1
  category: limbo_authoring
  difficulty: medium
  subcategory: control
  language: limbo
  prompt: 'Write a complete, compilable Limbo program with a function `route(p:
    string): int` that uses `case` to return 1, 2, 3 for paths starting with
    `/dev/`, `/usr/`, `/srv/` and 0 otherwise. Use the `or` alternative +
    `=>` arm pattern. `init` calls it on `/dev/null`, `/usr/me`, `/foo` and
    prints each result.'
  grader:
    kind: compile_gate
    config:
      gate_lang: limbo
  golden:
    source: "implement L;\ninclude \"sys.m\";\ninclude \"draw.m\";\ninclude\
      \ \"string.m\";\nsys: Sys;\nstr: String;\nL: module { init: fn(nil:\
      \ ref Draw->Context, argv: list of string); };\nroute(p: string): int\n\
      {\n\tif (str->prefix(\"/dev/\", p)) return 1;\n\tif (str->prefix(\"\
      /usr/\", p)) return 2;\n\tif (str->prefix(\"/srv/\", p)) return 3;\n\
      \treturn 0;\n}\ninit(nil: ref Draw->Context, nil: list of string)\n\
      {\n\tsys = load Sys Sys->PATH;\n\tstr = load String String->PATH;\n\t\
      sys->print(\"%d\\n\", route(\"/dev/null\"));\n\tsys->print(\"%d\\n\"\
      , route(\"/usr/me\"));\n\tsys->print(\"%d\\n\", route(\"/foo\"));\n\
      }\n"
  notes: ''
  provenance:
    authored_by: human
    spdx: MIT
  needs_golden: false
  tags:
  - golden_validated_via_iol_gate
- id: limbo_iter_dirread_v1
  category: limbo_authoring
  difficulty: hard
  subcategory: sys
  language: limbo
  prompt: Write a complete, compilable Limbo program that iterates the directory
    `/tmp` using sys->dirread in a loop until it returns zero or negative.
    For each entry, print its name. Use a buffered approach where each dirread
    call returns an array of Dir.
  grader:
    kind: compile_gate
    config:
      gate_lang: limbo
  golden:
    source: "implement L;\ninclude \"sys.m\";\ninclude \"draw.m\";\nsys: Sys;\n\
      L: module { init: fn(nil: ref Draw->Context, argv: list of string);\
      \ };\ninit(nil: ref Draw->Context, nil: list of string)\n{\n\tsys =\
      \ load Sys Sys->PATH;\n\tfd := sys->open(\"/tmp\", Sys->OREAD);\n\t\
      if (fd == nil)\n\t\treturn;\n\tfor (;;) {\n\t\t(n, dirs) := sys->dirread(fd);\n\
      \t\tif (n <= 0)\n\t\t\tbreak;\n\t\tfor (i := 0; i < n; i++)\n\t\t\t\
      sys->print(\"%s\\n\", dirs[i].name);\n\t}\n}\n"
  notes: ''
  provenance:
    authored_by: human
    spdx: MIT
  needs_golden: false
  tags:
  - golden_validated_via_iol_gate
- id: limbo_list_filter_v1
  category: limbo_authoring
  difficulty: medium
  subcategory: data_structures
  language: limbo
  prompt: 'Write a complete, compilable Limbo program with a function `evens(l:
    list of int): list of int` that returns only the even elements, in the
    same order. `init` calls it on `1 :: 2 :: 3 :: 4 :: 5 :: nil` and prints
    each result on its own line.'
  grader:
    kind: compile_gate
    config:
      gate_lang: limbo
  golden:
    source: "implement L;\ninclude \"sys.m\";\ninclude \"draw.m\";\nsys: Sys;\n\
      L: module { init: fn(nil: ref Draw->Context, argv: list of string);\
      \ };\nevens(l: list of int): list of int\n{\n\tr: list of int = nil;\n\
      \tfor (; l != nil; l = tl l)\n\t\tif ((hd l) % 2 == 0)\n\t\t\tr = hd\
      \ l :: r;\n\t# r is reversed; reverse back\n\tout: list of int = nil;\n\
      \tfor (; r != nil; r = tl r)\n\t\tout = hd r :: out;\n\treturn out;\n\
      }\ninit(nil: ref Draw->Context, nil: list of string)\n{\n\tsys = load\
      \ Sys Sys->PATH;\n\tsrc := 1 :: 2 :: 3 :: 4 :: 5 :: nil;\n\tfor (l :=\
      \ evens(src); l != nil; l = tl l)\n\t\tsys->print(\"%d\\n\", hd l);\n\
      }\n"
  notes: ''
  provenance:
    authored_by: human
    spdx: MIT
  needs_golden: false
  tags:
  - golden_validated_via_iol_gate
