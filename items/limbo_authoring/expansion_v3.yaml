items:
- id: limbo_keyring_load_v1
  category: limbo_authoring
  difficulty: easy
  subcategory: keyring
  language: limbo
  prompt: Write a complete, compilable Limbo program that loads the `keyring`
    module via `load Keyring Keyring->PATH` and prints `keyring loaded`. Just
    verifies the include + load — don't call any keyring functions.
  grader:
    kind: compile_gate
    config:
      gate_lang: limbo
  golden:
    source: "implement L;\ninclude \"sys.m\";\ninclude \"draw.m\";\ninclude\
      \ \"keyring.m\";\nsys: Sys;\nkr: Keyring;\nL: module { init: fn(nil:\
      \ ref Draw->Context, argv: list of string); };\ninit(nil: ref Draw->Context,\
      \ nil: list of string)\n{\n\tsys = load Sys Sys->PATH;\n\tkr = load\
      \ Keyring Keyring->PATH;\n\tsys->print(\"keyring loaded\\n\");\n}\n"
  notes: ''
  provenance:
    authored_by: human
    spdx: MIT
  needs_golden: false
  tags:
  - golden_validated_via_iol_gate
- id: limbo_sha1_hash_v1
  category: limbo_authoring
  difficulty: medium
  subcategory: keyring
  language: limbo
  prompt: Write a complete, compilable Limbo program that uses the keyring
    module's `sha1` digest. Hash the bytes of the string `"hello, limbo"`
    and print the digest length using `len`. The state is initialised by `kr->sha1(buf,
    len buf, hash, nil)`.
  grader:
    kind: compile_gate
    config:
      gate_lang: limbo
  golden:
    source: "implement L;\ninclude \"sys.m\";\ninclude \"draw.m\";\ninclude\
      \ \"keyring.m\";\nsys: Sys;\nkr: Keyring;\nL: module { init: fn(nil:\
      \ ref Draw->Context, argv: list of string); };\ninit(nil: ref Draw->Context,\
      \ nil: list of string)\n{\n\tsys = load Sys Sys->PATH;\n\tkr = load\
      \ Keyring Keyring->PATH;\n\tbuf := array of byte \"hello, limbo\";\n\
      \thash := array[Keyring->SHA1dlen] of byte;\n\tkr->sha1(buf, len buf,\
      \ hash, nil);\n\tsys->print(\"digest len=%d\\n\", len hash);\n}\n"
  notes: ''
  provenance:
    authored_by: human
    spdx: MIT
  needs_golden: false
  tags:
  - golden_validated_via_iol_gate
- id: limbo_security_random_v1
  category: limbo_authoring
  difficulty: easy
  subcategory: keyring
  language: limbo
  prompt: 'Write a complete, compilable Limbo program that uses Inferno''s
    `Random` module (declared in `security.m`) to fill an array of 16 bytes
    with random data. Use `Random->NotQuiteRandom` and `randombuf(which, n):
    array of byte`.'
  grader:
    kind: compile_gate
    config:
      gate_lang: limbo
  golden:
    source: "implement L;\ninclude \"sys.m\";\ninclude \"draw.m\";\ninclude\
      \ \"keyring.m\";\ninclude \"security.m\";\nsys: Sys;\nrandom: Random;\n\
      L: module { init: fn(nil: ref Draw->Context, argv: list of string);\
      \ };\ninit(nil: ref Draw->Context, nil: list of string)\n{\n\tsys =\
      \ load Sys Sys->PATH;\n\trandom = load Random Random->PATH;\n\tbuf :=\
      \ random->randombuf(Random->NotQuiteRandom, 16);\n\tsys->print(\"random\
      \ bytes generated len=%d\\n\", len buf);\n}\n"
  notes: ''
  provenance:
    authored_by: human
    spdx: MIT
  needs_golden: false
  tags:
  - golden_validated_via_iol_gate
- id: limbo_sys_chdir_v1
  category: limbo_authoring
  difficulty: easy
  subcategory: sys
  language: limbo
  prompt: 'Write a complete, compilable Limbo program that calls sys->chdir
    to change to `/tmp`. On failure, prints `chdir failed: %r` to stderr and
    exits.'
  grader:
    kind: compile_gate
    config:
      gate_lang: limbo
  golden:
    source: "implement L;\ninclude \"sys.m\";\ninclude \"draw.m\";\nsys: Sys;\n\
      L: module { init: fn(nil: ref Draw->Context, argv: list of string);\
      \ };\ninit(nil: ref Draw->Context, nil: list of string)\n{\n\tsys =\
      \ load Sys Sys->PATH;\n\tif (sys->chdir(\"/tmp\") < 0)\n\t\tsys->fprint(sys->fildes(2),\
      \ \"chdir failed: %r\\n\");\n}\n"
  notes: ''
  provenance:
    authored_by: human
    spdx: MIT
  needs_golden: false
  tags:
  - golden_validated_via_iol_gate
