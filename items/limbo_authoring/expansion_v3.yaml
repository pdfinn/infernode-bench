      \ { init: fn(nil: ref Draw->Context, argv: list of string); };\ninit(nil:\
      \ ref Draw->Context, nil: list of string)\n{\n\tsys = load Sys Sys->PATH;\n\
      \tstyx = load Styx Styx->PATH;\n\tstyx->init();\n\tm: ref Tmsg = ref\
      \ Tmsg.Version(0, 8192, \"9P2000\");\n\tpick mm := m {\n\t\tVersion\
      \ => sys->print(\"built version: msize=%d\\n\", mm.msize);\n\t}\n}\n"
