- id: limbo_sys_wstat_v1
  category: limbo_authoring
  difficulty: hard
  subcategory: sys
  language: limbo
  prompt: Write a complete, compilable Limbo program that uses sys->wstat
    to rename `/tmp/old.txt` to `/tmp/new.txt`. First stat to get a Dir, mutate
    its `name` field, then wstat. On any failure, print the errstr to stderr.
  grader:
    kind: compile_gate
    config:
      gate_lang: limbo
  golden:
    source: "implement L;\ninclude \"sys.m\";\ninclude \"draw.m\";\nsys: Sys;\n\
      L: module { init: fn(nil: ref Draw->Context, argv: list of string);\
      \ };\ninit(nil: ref Draw->Context, nil: list of string)\n{\n\tsys =\
      \ load Sys Sys->PATH;\n\t(ok, dir) := sys->stat(\"/tmp/old.txt\");\n\
      \tif (ok < 0) {\n\t\tsys->fprint(sys->fildes(2), \"stat: %r\\n\");\n\
      \t\treturn;\n\t}\n\tdir.name = \"new.txt\";\n\tif (sys->wstat(\"/tmp/old.txt\"\
      , dir) < 0)\n\t\tsys->fprint(sys->fildes(2), \"wstat: %r\\n\");\n}\n"
  notes: ''
  provenance:
    authored_by: human
    spdx: MIT
  needs_golden: false
  tags:
  - golden_validated_via_iol_gate
