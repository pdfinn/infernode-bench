# 9p_tool_use — expansion_v1
# 24 items authored fresh; goldens validated.

items:
- id: tool_walk_root_v1
  category: 9p_tool_use
  difficulty: trivial
  subcategory: tool_discovery
  language: inferno_sh
  prompt: Write an Inferno sh one-liner that lists the names of every tool
    currently mounted at `/tool/`. Each tool exposes a directory under `/tool/<name>/`.
  grader:
    kind: trace_match
    config: {}
  golden:
    trace:
    - op: walk
      path: /tool
  notes: Tests the walk-the-namespace primitive.
  provenance:
    authored_by: human
    spdx: MIT
  needs_golden: false
  tags: []
