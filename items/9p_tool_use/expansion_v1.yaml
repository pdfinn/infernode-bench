- id: tool_rc_for_each_tool_v1
  category: 9p_tool_use
  difficulty: hard
  subcategory: rc_driven
  language: inferno_sh
  prompt: Write an Inferno sh sequence that reads `/tool/_registry` to enumerate
    every tool, and for each, reads its `/tool/<name>/doc` file.
  grader:
    kind: trace_match
    config:
      equivalence_classes:
      - drop_redundant_read
  golden:
    trace:
    - op: read
      path: /tool/_registry
    - op: read
      path: /tool/find/doc
    - op: read
      path: /tool/grep/doc
    - op: read
      path: /tool/read/doc
  notes: Representative reads. trace_match matcher's equivalence-class slack
    will accept any tool/doc reads.
  provenance:
    authored_by: human
    spdx: MIT
  needs_golden: false
  tags: []
- id: tool_limbo_argv_dispatch_v1
  category: 9p_tool_use
  difficulty: hard
  subcategory: limbo_driven
  language: limbo
  prompt: Write a complete, compilable Limbo program named `Vrun` that takes
    a tool name in argv[1] and the rest of argv as the args to that tool.
    It joins argv[2..] with spaces, writes them to `/tool/<name>/ctl`, reads
    back the result, and prints it. If the tool doesn't exist (sys->open returns
    nil), it should print `unknown tool` to stderr.
  grader:
    kind: trace_match
    config: {}
  golden:
    trace:
    - op: write
      path: /tool/example/ctl
      data: args
    - op: read
      path: /tool/example/ctl
  notes: Representative invocation with a placeholder tool name.
  provenance:
    authored_by: human
    spdx: MIT
  needs_golden: false
  tags: []
