- id: tool_missing_open_fails_v1
  category: 9p_tool_use
  difficulty: easy
  subcategory: error_handling
  language: limbo
  prompt: 'Write a complete, compilable Limbo program that attempts to open
    `/tool/fakefake/ctl`. On nil (the tool doesn''t exist), print `tool not
    found: fakefake` to stderr and exit with status `"fail:missing tool"`.
    On (unexpected) success, print `oops` to stdout.'
  grader:
    kind: trace_match
    config: {}
  golden:
    trace:
    - op: open
      path: /tool/fakefake/ctl
  notes: 'Negative-path: the operation must fail.'
  provenance:
    authored_by: human
    spdx: MIT
  needs_golden: false
  tags: []
