- id: tool_help_for_tool_v1
  category: 9p_tool_use
  difficulty: medium
  subcategory: tool_discovery
  language: limbo
  prompt: 'Write a complete, compilable Limbo program that uses `/tool/help`
    to look up help for the `mount` tool. The protocol: open `/tool/help`
