- id: tool_chain_find_then_read_each_v1
  category: 9p_tool_use
  difficulty: medium
  subcategory: chained
  language: inferno_sh
  prompt: Write an Inferno sh sequence that uses `find` to list every `.m`
    file under `/module`, then for each result, calls `read` to print the
    first line. Use Veltro's 9P tool interface throughout.
  grader:
    kind: trace_match
    config:
      equivalence_classes:
      - drop_redundant_read
  golden:
    trace:
    - op: write
      path: /tool/find/ctl
      data: '*.m /module'
    - op: read
      path: /tool/find/ctl
    - op: write
      path: /tool/read/ctl
    - op: read
      path: /tool/read/ctl
  provenance:
    authored_by: human
    spdx: MIT
  needs_golden: false
  tags: []
