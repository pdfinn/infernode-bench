- id: tool_invoke_find_v1
  category: 9p_tool_use
  difficulty: easy
  language: limbo
  prompt: |
    Veltro exposes its `find` tool via 9P at `/tool/find/ctl`
    (write the search args, read the result back from the same
    file). Write a complete, compilable Limbo program that drives
    `find` with the args `*.b /appl/veltro` and prints whatever
    the tool returns to stdout.
  grader:
    kind: trace_match
    config:
      max_edit_distance: 0
  needs_golden: false
  provenance:
    authored_by: human
    spdx: MIT
    source_repo: infernode-os-llm@801df94d0b83
    derived_from: eval/scenarios/baseline_v2.yaml
  tags:
  - baseline_v2_migration
  - golden_validated_via_iol_gate
  golden:
    trace:
    - op: write
      path: /tool/find/ctl
      data: '*.b /appl/veltro'
    - op: read
      path: /tool/find/ctl
