- id: tool_concurrent_three_v1
  category: 9p_tool_use
  difficulty: hard
  subcategory: concurrent
  language: inferno_sh
  prompt: 'Concurrently invoke three Veltro tools: `find` for `*.b /appl`,
    `grep` for `panic /n/log`, `man` for `bind(1)`. Read all three results.'
  grader:
    kind: trace_match
    config:
      equivalence_classes:
      - reorder_writes
  golden:
    trace:
    - op: write
      path: /tool/find/ctl
      data: '*.b /appl'
    - op: write
      path: /tool/grep/ctl
      data: panic /n/log
    - op: write
      path: /tool/man/ctl
      data: bind(1)
    - op: read
      path: /tool/find/ctl
    - op: read
      path: /tool/grep/ctl
    - op: read
      path: /tool/man/ctl
  provenance:
    authored_by: human
    spdx: MIT
  needs_golden: false
  tags: []
