  needs_golden: false
  tags: []
- id: tool_limbo_two_tools_v1
  category: 9p_tool_use
  difficulty: hard
  subcategory: limbo_driven
  language: limbo
  prompt: 'Write a complete, compilable Limbo program that calls Veltro''s
    `find` tool with args `*.b /appl/cmd`, then for each result (split on
    newlines), calls `read` to get the file''s first line. Print the path
    and the first line, separated by `: `.'
  grader:
    kind: trace_match
    config:
      equivalence_classes:
      - drop_redundant_read
  golden:
    trace:
    - op: write
      path: /tool/find/ctl
      data: '*.b /appl/cmd'
    - op: read
      path: /tool/find/ctl
    - op: write
      path: /tool/read/ctl
    - op: read
      path: /tool/read/ctl
  notes: ''
  provenance:
    authored_by: human
    spdx: MIT
  needs_golden: false
  tags: []
