# 9p_tool_use — expansion_v2
# 12 items authored fresh; goldens validated.

items:
- id: tool_alt_dispatch_v1
  category: 9p_tool_use
  difficulty: hard
  subcategory: concurrent
  language: limbo
  prompt: 'Write a complete, compilable Limbo program that fires three Veltro
    tool invocations in parallel: `find`, `grep`, and `read`, each in its
    own goroutine. As each completes, print `<tool>: done`. Use `alt` to demux
    completion channels.'
  grader:
    kind: trace_match
    config:
      equivalence_classes:
      - reorder_writes
  golden:
    trace:
    - op: write
      path: /tool/find/ctl
    - op: read
      path: /tool/find/ctl
    - op: write
      path: /tool/grep/ctl
    - op: read
      path: /tool/grep/ctl
    - op: write
      path: /tool/read/ctl
    - op: read
      path: /tool/read/ctl
  notes: ''
  provenance:
    authored_by: human
    spdx: MIT
  needs_golden: false
  tags: []
- id: tool_concurrent_grep_v1
  category: 9p_tool_use
  difficulty: medium
  subcategory: concurrent
  language: inferno_sh
  prompt: Use Veltro's `grep` tool to search for two patterns concurrently
    — `error` and `warning` — over the same path `/n/log/messages`. Submit
    both requests, read both results.
  grader:
    kind: trace_match
    config:
      equivalence_classes:
      - reorder_writes
  golden:
    trace:
    - op: write
      path: /tool/grep/ctl
      data: error /n/log/messages
    - op: write
      path: /tool/grep/ctl
      data: warning /n/log/messages
    - op: read
      path: /tool/grep/ctl
    - op: read
      path: /tool/grep/ctl
  notes: ''
  provenance:
    authored_by: human
    spdx: MIT
  needs_golden: false
  tags: []
- id: tool_ctl_then_data_v1
  category: 9p_tool_use
  difficulty: medium
  subcategory: ctl_data
  language: inferno_sh
  prompt: Veltro's `safeexec` tool decomposes into `/tool/safeexec/ctl` (command)
    and `/tool/safeexec/data` (streaming output). Write an Inferno sh sequence
    that writes the command `ls /usr/me` to ctl, then reads the streaming
    output from data.
  grader:
    kind: trace_match
    config: {}
  golden:
    trace:
    - op: write
      path: /tool/safeexec/ctl
      data: ls /usr/me
    - op: read
      path: /tool/safeexec/data
  notes: ''
  provenance:
    authored_by: human
    spdx: MIT
  needs_golden: false
  tags: []
