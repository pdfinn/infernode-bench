- id: tool_doc_for_each_then_use_v1
  category: 9p_tool_use
  difficulty: hard
  subcategory: chained
  language: inferno_sh
  prompt: Read docs for `find`, `grep`, and `read` in turn, then invoke `find`
    with `*.b /appl/cmd` and pipe (via read of `find` then writes-then-reads
    on `read`) the first result file's contents.
  grader:
    kind: trace_match
    config:
      equivalence_classes:
      - reorder_writes
      - drop_redundant_read
  golden:
    trace:
    - op: read
      path: /tool/find/doc
    - op: read
      path: /tool/grep/doc
    - op: read
      path: /tool/read/doc
    - op: write
      path: /tool/find/ctl
      data: '*.b /appl/cmd'
    - op: read
      path: /tool/find/ctl
    - op: write
      path: /tool/read/ctl
    - op: read
      path: /tool/read/ctl
  notes: ''
  provenance:
    authored_by: human
    spdx: MIT
  needs_golden: false
  tags: []
- id: tool_error_partial_v1
  category: 9p_tool_use
  difficulty: medium
  subcategory: error_handling
  language: inferno_sh
  prompt: Veltro's `mount` tool fails if asked to mount a non-existent /srv
    endpoint. Write a sequence that attempts to mount `/srv/nonsense` at `/n/x`
    (this should fail), reads back the error, then succeeds with `/srv/cs`
    at `/n/cs`.
  grader:
    kind: trace_match
    config: {}
  golden:
    trace:
    - op: write
      path: /tool/mount/ctl
      data: /srv/nonsense /n/x
    - op: read
      path: /tool/mount/ctl
    - op: write
      path: /tool/mount/ctl
      data: /srv/cs /n/cs
    - op: read
      path: /tool/mount/ctl
  notes: ''
  provenance:
    authored_by: human
    spdx: MIT
  needs_golden: false
  tags: []
