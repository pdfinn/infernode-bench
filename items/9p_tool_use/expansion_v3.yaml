# 9p_tool_use — expansion_v3
# 12 items authored fresh; goldens validated.

items:
- id: tool_doc_first_search_v1
  category: 9p_tool_use
  difficulty: easy
  subcategory: discovery
  language: inferno_sh
  prompt: Use Veltro's `search` tool — but FIRST read its doc at `/tool/search/doc`
    to learn the args format, then invoke with args `inferno 9p`.
  grader:
    kind: trace_match
    config: {}
  golden:
    trace:
    - op: read
      path: /tool/search/doc
    - op: write
      path: /tool/search/ctl
      data: inferno 9p
    - op: read
      path: /tool/search/ctl
  notes: ''
  provenance:
    authored_by: human
    spdx: MIT
  needs_golden: false
  tags: []
