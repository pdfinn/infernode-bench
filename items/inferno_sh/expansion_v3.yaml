  category: inferno_sh
  difficulty: medium
  subcategory: redirect
  language: inferno_sh
  prompt: Write an Inferno sh snippet that runs `mk all`, redirecting stdout
    to `out.log` and stderr to `err.log` using Inferno's `>[2]` syntax.
  grader:
    kind: compile_gate
    config:
      gate_lang: rc
  golden:
    source: |
      mk all > out.log >[2] err.log
  notes: ''
