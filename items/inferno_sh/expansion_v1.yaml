- id: sh_no_if_paren_v1
  category: inferno_sh
  difficulty: easy
  subcategory: anti_rc
  language: inferno_sh
  prompt: 'Write an Inferno sh snippet that, if `$user` equals `root`, echoes
    `welcome`. Note: Inferno sh uses `if {~ $user root} { echo welcome }`
    — NOT Plan 9 rc''s `if(~ $user root) echo welcome` form.'
  grader:
    kind: compile_gate
    config:
      gate_lang: rc
  golden:
    source: |
      user=root
      if {~ $user root} { echo welcome }
  notes: ''
  provenance:
    authored_by: human
    spdx: MIT
  needs_golden: false
  tags:
  - golden_validated_via_iol_gate
- id: sh_check_status_v1
  category: inferno_sh
  difficulty: medium
  subcategory: error
  language: inferno_sh
  prompt: 'Write an Inferno sh snippet that runs `false`, checks the exit
    status via `$status`, and if non-empty prints `failed: $status`.'
  grader:
    kind: compile_gate
    config:
      gate_lang: rc
  golden:
    source: |
      false
      if {! ~ $status ''} { echo failed: $status }
  notes: '`$status` carries the last exit status. Empty == success.'
  provenance:
    authored_by: human
    spdx: MIT
  needs_golden: false
  tags:
  - golden_validated_via_iol_gate
- id: sh_or_fallback_v1
  category: inferno_sh
  difficulty: easy
  subcategory: error
  language: inferno_sh
  prompt: Write an Inferno sh snippet that runs `mkdir /tmp/x` and, if it
    fails, prints `mkdir failed` to stderr. Use `||`.
  grader:
    kind: compile_gate
    config:
      gate_lang: rc
  golden:
    source: |
      mkdir /tmp/x || echo mkdir failed >[1=2]
  notes: '`>[1=2]` redirects stdout to stderr in Inferno sh.'
  provenance:
    authored_by: human
    spdx: MIT
  needs_golden: false
  tags:
  - golden_validated_via_iol_gate
