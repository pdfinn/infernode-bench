- id: sh_fn_with_args_v1
  category: inferno_sh
  difficulty: easy
  subcategory: fn
  language: inferno_sh
  prompt: Write an Inferno sh function `add` that takes two args and prints
    their sum using the `math` filter (`echo $1 ^ $2 | math`). Then call `add
    3 4`.
  grader:
    kind: compile_gate
    config:
      gate_lang: rc
  golden:
    source: |
      fn add { echo $1 ^ + ^ $2 | math }
      add 3 4
  notes: ''
  provenance:
    authored_by: human
    spdx: MIT
  needs_golden: false
  tags:
  - golden_validated_via_iol_gate
- id: sh_fn_local_v1
  category: inferno_sh
  difficulty: medium
  subcategory: fn
  language: inferno_sh
  prompt: Write an Inferno sh function `inenv` that, given an env-var name
    as its argument, prints the value of that variable (use indirection via
    the `$"$1"` form). Then call `inenv home` after setting `home=/usr/me`.
  grader:
    kind: compile_gate
    config:
      gate_lang: rc
  golden:
    source: |
      fn inenv { echo $$1 }
      home=/usr/me
      inenv home
  notes: ''
  provenance:
    authored_by: human
    spdx: MIT
  needs_golden: false
  tags:
  - golden_validated_via_iol_gate
- id: sh_fn_recursive_v1
  category: inferno_sh
  difficulty: hard
  subcategory: fn
  language: inferno_sh
  prompt: Write an Inferno sh function `countdown` that, given a number argument,
    prints it and calls itself with N-1 unless N is 0. Then call `countdown
    3`.
  grader:
    kind: compile_gate
    config:
      gate_lang: rc
  golden:
    source: "fn countdown {\n\techo $1\n\tif {test $1 -gt 0} { countdown `{echo\
      \ $1 ^ -1 | math} }\n}\ncountdown 3\n"
  notes: ''
  provenance:
    authored_by: human
    spdx: MIT
  needs_golden: false
  tags:
  - golden_validated_via_iol_gate
