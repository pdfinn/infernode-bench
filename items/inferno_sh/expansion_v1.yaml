- id: sh_command_substitution_v1
  category: inferno_sh
  difficulty: easy
  subcategory: vars
  language: inferno_sh
  prompt: 'Write an Inferno sh snippet that captures the current user from
    `/dev/user` into a variable `u` using backquote substitution (`u=`{...}`),
    then prints `user: $u`.'
  grader:
    kind: compile_gate
    config:
      gate_lang: rc
  golden:
    source: |
      u=`{cat /dev/user}
      echo user: $u
  notes: ''
  provenance:
    authored_by: human
    spdx: MIT
  needs_golden: false
  tags:
  - golden_validated_via_iol_gate
- id: sh_list_quoting_v1
  category: inferno_sh
  difficulty: easy
  subcategory: vars
  language: inferno_sh
  prompt: Write an Inferno sh snippet that sets `paths` to the list `/bin
    /dis /env` (use sh list syntax with parentheses), then iterates with a
    for-loop and prints each path.
  grader:
    kind: compile_gate
    config:
      gate_lang: rc
  golden:
    source: |
      paths=(/bin /dis /env)
      for p in $paths { echo $p }
  notes: ''
  provenance:
    authored_by: human
    spdx: MIT
  needs_golden: false
  tags:
  - golden_validated_via_iol_gate
- id: sh_while_v1
  category: inferno_sh
  difficulty: medium
  subcategory: control
  language: inferno_sh
  prompt: 'Write an Inferno sh snippet that counts down from 3 to 1 using
    `while`, printing each value. Use Inferno''s curly-brace form: `while
    {cond} { body }`.'
  grader:
    kind: compile_gate
    config:
      gate_lang: rc
  golden:
    source: |
      i=3
      while {test $i -gt 0} { echo $i ; i=`{echo $i ^ -1 | math} }
  notes: Tests Inferno's `while {cond} { body }` form vs Plan 9 rc's `while(cond)
    cmd`.
  provenance:
    authored_by: human
    spdx: MIT
  needs_golden: false
  tags:
  - golden_validated_via_iol_gate
- id: sh_if_else_v1
  category: inferno_sh
  difficulty: easy
  subcategory: control
  language: inferno_sh
  prompt: Write an Inferno sh snippet that tests if `/dev/user` exists. If
    yes, prints `user available`; otherwise prints `no user`. Use Inferno's
    `if {cond} { yes } { no }` triple-block form.
  grader:
    kind: compile_gate
    config:
      gate_lang: rc
  golden:
    source: |
      if {test -f /dev/user} { echo user available } { echo no user }
  notes: ''
  provenance:
    authored_by: human
    spdx: MIT
  needs_golden: false
  tags:
  - golden_validated_via_iol_gate
- id: sh_switch_pattern_v1
  category: inferno_sh
  difficulty: medium
  subcategory: control
  language: inferno_sh
  prompt: 'Write an Inferno sh snippet that dispatches on `$service`: if it''s
    `dns` print `name service`; if `cs` print `connection server`; otherwise
    print `unknown: $service`. Pre-set `service=dns`. Use `if {~ ...} { ...
    } { ... }` chains.'
  grader:
    kind: compile_gate
    config:
      gate_lang: rc
  golden:
    source: |
      service=dns
      if {~ $service dns} { echo name service } { if {~ $service cs} { echo connection server } { echo unknown: $service } }
  notes: ''
  provenance:
    authored_by: human
    spdx: MIT
  needs_golden: false
  tags:
  - golden_validated_via_iol_gate
- id: sh_case_match_v1
  category: inferno_sh
  difficulty: hard
  subcategory: control
  language: inferno_sh
  prompt: 'Write an Inferno sh snippet that takes the FIRST argument from
    `$1` and dispatches: `start` echoes `starting`, `stop` echoes `stopping`,
    anything else echoes `unknown command: $1`. Use `if {~ ...}` clauses with
    the triple-block else form.'
  grader:
    kind: compile_gate
    config:
      gate_lang: rc
  golden:
    source: |
      cmd=start
      if {~ $cmd start} { echo starting } { if {~ $cmd stop} { echo stopping } { echo unknown command: $cmd } }
  notes: ''
  provenance:
    authored_by: human
    spdx: MIT
  needs_golden: false
  tags:
  - golden_validated_via_iol_gate
