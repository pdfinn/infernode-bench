- id: sh_cleanup_trap_v1
  category: inferno_sh
  difficulty: medium
  subcategory: error
  language: inferno_sh
  prompt: Write an Inferno sh function `cleanup` that prints `cleaning up`
    and unmounts `/n/work` if it's mounted. Call `cleanup` at the end of a
    script body that first binds `/n/local` to `/n/work`, runs `ls /n/work`,
    and then runs cleanup.
  grader:
    kind: compile_gate
    config:
      gate_lang: rc
  golden:
    source: |
      fn cleanup { echo cleaning up ; unmount /n/work }
      bind /n/local /n/work
      ls /n/work
      cleanup
  notes: ''
  provenance:
    authored_by: human
    spdx: MIT
  needs_golden: false
  tags:
  - golden_validated_via_iol_gate
