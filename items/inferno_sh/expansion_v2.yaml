- id: sh_veltro_invoke_v1
  category: inferno_sh
  difficulty: easy
  subcategory: veltro
  language: inferno_sh
  prompt: Write an Inferno sh one-liner that invokes Veltro's `grep` tool
    with the pattern `panic` over `/n/log/messages`. Tool at /tool/grep/ctl.
  grader:
    kind: compile_gate
    config:
      gate_lang: rc
  golden:
    source: |
      echo panic /n/log/messages > /tool/grep/ctl && cat /tool/grep/ctl
  notes: ''
  provenance:
    authored_by: human
    spdx: MIT
  needs_golden: false
  tags:
  - golden_validated_via_iol_gate
- id: sh_veltro_chain_v1
  category: inferno_sh
  difficulty: medium
  subcategory: veltro
  language: inferno_sh
  prompt: Write an Inferno sh sequence that uses Veltro's `find` tool to list
    all `.b` files under `/appl/veltro`, then for each, calls Veltro's `read`
    tool to print the file size in bytes. Use backquote substitution to capture
    find's output.
  grader:
    kind: compile_gate
    config:
      gate_lang: rc
  golden:
    source: |
      for f in `{echo '*.b /appl/veltro' > /tool/find/ctl && cat /tool/find/ctl} { echo $f > /tool/read/ctl ; cat /tool/read/ctl }
  notes: ''
  provenance:
    authored_by: human
    spdx: MIT
  needs_golden: false
  tags:
  - golden_validated_via_iol_gate
